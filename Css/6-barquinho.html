<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Barquinho nadando</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
}

.cena {
    position: relative;
    width: 100%;
    height: 100vh;
    background: linear-gradient(#83b3cf, #70cfff);
}

.mar {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40%;
    background: #5c79fa;
    overflow: hidden;
}

.mar::before,
.mar::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 100%;
    top: -20px;
    background: radial-gradient(circle, rgba(255,255,255,0.3) 20%, transparent 20%);
    background-size: 50px 50px;
    animation: ondas 6s linear infinite;
}

.mar::after {
    top: -10px;
    opacity: 0.5;
    animation-duration: 8s;
}

@keyframes ondas {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

.barco {
    position: absolute;
    bottom: 32%;
    left: -140px;

    font-size: 140px;

    animation: moverBarco 10s linear infinite,
               balanco 2s ease-in-out infinite;

    z-index: 3;
}

@keyframes moverBarco {
    from { left: -140px; }
    to { left: 110%; }
}

@keyframes balanco {
    0% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
    100% { transform: rotate(-5deg); }
}

.nuvem {
    position: absolute;
    top: 60px;
    left: -200px;

    width: 130px;
    height: 70px;

    font-size: 100px;

    animation: moverNuvem 25s linear infinite;
}

@keyframes moverNuvem {
    from { left: -200px; }
    to { left: 110%; }
}

</style>
</head>

<body>

<div class="cena">
    <div class="nuvem">☁️</div>
    <div class="barco">🛶</div>
    <div class="mar"></div>
</div>

</body>
</html>
