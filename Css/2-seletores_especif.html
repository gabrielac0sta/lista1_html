<!DOCTYPE html>
<head>   
   <title>Exemplo especificidade de seletores</title>
   <style>
      /* regra 1 */ li{color:red;}
      /* regra 2 */ .churras{color:green;}
      /* regra 3 */ .fruta{color:gray}
      /* regra 4 */ li+li.churras{color:black;}
      /* regra 5 */ .churras[draggable="true"]{color:magenta;}
      /* regra 6 */ #lip1,#lip2,#lip3{color:blue}
      /* regra 7 */ #lip3.fruta{color:orange}
      /* regra 8 */ ol>li.churras#lip5{color:purple}
   </style>
</head>
<body>   
   <ol>

   <li id="lip0">Abacaxi</li> <!-- regra 1 aplica porque é li, fica vermelho -->

   <li class="fruta">Melão</li> <!-- regra 3 aplica porque tem classe fruta, fica cinza -->

   <li id="lip2" class="fruta">Pera</li>  <!-- regra 6 aplica porque id tem prioridade, fica azul -->

   <li id="lip3" class="fruta">Uva</li> <!-- regra 7 ganha da regra 6 porque é mais específica id + classe, fica laranja -->

   <li id="lip4" class="fruta">Maçã</li> <!-- regra 3 aplica porque é fruta, fica cinza -->

   <li class="churras">Carne</li> <!-- regra 2 aplica porque tem classe churras, fica verde -->

   <li class="churras">Linguiça</li> <!-- regra 4 aplica porque é churras depois de outro li, fica preto -->

   <li id="lip7" class="churras" draggable="true">Pão de alho</li> <!-- regra 5 aplica porque tem churras e draggable true, fica magenta -->

   </ol>   
</body>
</html>
