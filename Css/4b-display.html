<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0px; padding:0px; box-sizing:border-box}
        body{height: 100vh; font-size:0px;

    }
    .box{border:1px solid black;
        font-size:16px;
        display: inline-block;
        width: 25vh;
        height: 50vh;
    }
        #box1{background-color:blue;}
        #box2{background-color:green;}
        #box3{background-color:red;}
        #box4{background-color: yellow;}
    </style>
</head>
<body>
<div id="box1" class="box">1</div><div id="box2" class="box">2</div><div id="box3" class="box">3</div><div id="box4" class="box">4</div>
</body>
</html>
