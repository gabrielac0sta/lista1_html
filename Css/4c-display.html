<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        body{
            border:1px solid red;
            min-height:100vh;
            position:relative;
        }

        .box{
            width:100px;
            height:100px;
            text-align:center;
            line-height:100px;
            font-weight:bold;
            position:absolute;
        }
        #box1{
            background:red;
            top:0;
            left:0;
        }
        #box2{
            background:yellow;
            top:0;
            right:0;
        }
        #box3{
            background:blue;
            bottom:0;
            left:0;
        }
        #box4{
            background:green;
            bottom:0;
            right:0;
        }
        #box5{
            background:magenta;
            top:50%;
            left:50%;
            transform:translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="box1" class="box">1</div>
    <div id="box2" class="box">2</div>
    <div id="box3" class="box">3</div>
    <div id="box4" class="box">4</div>
    <div id="box5" class="box">5</div>
</body>
</html>
